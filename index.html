<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Learning Path — Índice del curso</title>
<style>
  :root {
    --serif: Georgia, 'Times New Roman', serif;
    --sans: system-ui, -apple-system, sans-serif;
    --text: #1a1a1a;
    --muted: #6b7280;
    --accent: #1d4ed8;
    --accent-light: #eff6ff;
    --bg: #fffef7;
    --card: #fff;
    --border: #e5e7eb;
    --ok: #15803d;
    --ok-light: #f0fdf4;
    --progress-bg: #e5e7eb;
    --progress-fill: #1d4ed8;
    --check-color: #15803d;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--text);
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
    line-height: 1.7;
  }

  /* ── Header ── */
  header { margin-bottom: 2.5rem; }
  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }
  header p {
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--muted);
  }

  /* ── Progress global ── */
  .global-progress {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 2.5rem;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--sans);
    margin-bottom: 0.75rem;
  }
  .progress-header span:first-child {
    font-weight: 600;
    font-size: 0.95rem;
  }
  .progress-header .counter {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .bar-track {
    height: 10px;
    background: var(--progress-bg);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1d4ed8, #6366f1);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── Module sections ── */
  .module {
    margin-bottom: 2rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .module-header {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 1rem 1.25rem;
    background: #f9fafb;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .module-header:hover { background: #f3f4f6; }

  .module-badge {
    font-family: var(--sans);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--accent);
    color: #fff;
    padding: 0.18rem 0.55rem;
    border-radius: 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .module-title {
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 600;
    flex: 1;
  }

  .module-mini-progress {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .module-mini-bar {
    width: 70px;
    height: 6px;
    background: var(--progress-bg);
    border-radius: 99px;
    overflow: hidden;
  }
  .module-mini-fill {
    height: 100%;
    background: linear-gradient(90deg, #1d4ed8, #6366f1);
    border-radius: 99px;
    transition: width 0.35s ease;
    width: 0%;
  }
  .module-mini-count {
    font-family: var(--sans);
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 32px;
    text-align: right;
  }

  .chevron {
    font-size: 0.7rem;
    color: var(--muted);
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .module.collapsed .chevron { transform: rotate(-90deg); }
  .module.collapsed .lesson-list { display: none; }

  /* ── Lesson list ── */
  .lesson-list { list-style: none; }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.7rem 1.25rem;
    border-top: 1px solid var(--border);
    transition: background 0.12s;
  }
  .lesson-item:hover { background: var(--accent-light); }
  .lesson-item.done { background: var(--ok-light); }

  .lesson-checkbox {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }
  .lesson-checkbox:hover { border-color: var(--accent); }
  .lesson-checkbox:checked {
    background: var(--check-color);
    border-color: var(--check-color);
  }
  .lesson-checkbox:checked::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 1px;
    width: 8px;
    height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg);
  }

  .lesson-link {
    font-family: var(--sans);
    font-size: 0.875rem;
    color: var(--accent);
    text-decoration: none;
    flex: 1;
    line-height: 1.4;
    transition: color 0.12s;
  }
  .lesson-link:hover { text-decoration: underline; }
  .lesson-item.done .lesson-link {
    color: var(--ok);
    text-decoration: line-through;
    opacity: 0.75;
  }

  .lesson-num {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 2rem;
    text-align: right;
  }

  /* ── Reset button ── */
  .actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }
  .btn-reset {
    font-family: var(--sans);
    font-size: 0.8rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.85rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-reset:hover { color: #dc2626; border-color: #dc2626; }

  /* ── Complete badge ── */
  .complete-badge {
    display: none;
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ok);
    background: var(--ok-light);
    border: 1px solid #bbf7d0;
    border-radius: 6px;
    padding: 0.25rem 0.65rem;
  }
  .complete-badge.visible { display: inline-block; }
</style>
</head>
<body>

<header>
  <h1>📚 LLM Learning Path</h1>
  <p>Curso completo de IA para programadores — marca cada lección al terminarla.</p>
</header>

<!-- Progress global -->
<div class="global-progress">
  <div class="progress-header">
    <span>Progreso total</span>
    <span class="counter" id="global-counter">0 / 55 lecciones</span>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="global-bar"></div>
  </div>
</div>

<!-- Módulos -->
<div id="course"></div>

<div class="actions">
  <span class="complete-badge" id="complete-badge">🎉 ¡Curso completado!</span>
  <button class="btn-reset" id="btn-reset">Reiniciar progreso</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
